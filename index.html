<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortyGras</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; }
        .map { width: 100%; height: 400px; background-color: #f0f0f0; display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; }
        .buttons { text-align: center; margin-top: 20px; }
        button { margin: 0 10px; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>PortyGras</h1>
    <p>Find restrooms in New Orleans during events</p>
    <div class="map">
        <p>Interactive Map of Bathrooms</p>
    </div>
    <div class="buttons">
        <button>Filter</button>
        <button>Find Bathroom</button>
    </div>
</body>
</html>
